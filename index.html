<!DOCTYPE html>
<html>
  <head>
    <title>Qr Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <style>
      body{
        background-color: hsl(212, 45%, 89%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height:100vh;
      }
      .back{
        background-color:hsl(0, 0%, 100%);
        height: 320px;
        width: 190px;
        padding: 20px 28px;
        border-radius: 10px;
        text-align:center;
      }
      img{
        width:100%;
        border-radius: 10px;
      }
      p{
        font-family: Outfit;
        margin-top:10px;
      }
      .bold{
        font-size: 16px;
        font-weight: 700;
        color: hsl(218, 44%, 22%);
      }
      .info{
        color: hsl(216, 15%, 48%);
        font-size: 12px;
        font-weight: 400;
      }
    </style>
  </head>
  <body>
    <div class="back">
      <img src="image-qr-code.png">
      <p class="bold">Improve your front-end skills by building projects</p>
      <p class="info">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
    </div>
  </body>
</html>
